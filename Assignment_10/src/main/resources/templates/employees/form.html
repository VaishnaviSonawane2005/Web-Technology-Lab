<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Employee | Task Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="sidebar">
        <h1>TaskForce Pro</h1>
        <nav>
            <a href="/">📁 Dashboard</a>
            <a href="/employees" class="active">👥 Employees</a>
            <a href="/tasks">📋 Task Board</a>
        </nav>
    </div>

    <div class="main-content">
        <header>
            <div class="search-bar">
                <input type="text" placeholder="Search tasks, employees...">
            </div>
            <div class="user-profile">
                <span>Welcome, Admin</span>
                <div class="avatar">A</div>
            </div>
        </header>

        <main>
            <div style="margin-bottom: 2rem; max-width: 600px; margin-left: auto; margin-right: auto;">
                <div style="margin-bottom: 2rem;">
                    <h2 style="font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, var(--primary-color), var(--accent-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">➕ Add New Faculty Member</h2>
                    <p style="color: var(--text-muted); font-weight: 500; margin-top: 0.5rem;">Enter the faculty member's details below</p>
                </div>
        
        <div class="card">
            <form th:action="@{/employees}" th:object="${employee}" method="post">
                <div class="form-group">
                    <label for="name">👤 Full Name</label>
                    <input type="text" id="name" th:field="*{name}" placeholder="e.g. Jane Doe" required>
                    <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                
                <div class="form-group">
                    <label for="email">✉️ Email Address</label>
                    <input type="email" id="email" th:field="*{email}" placeholder="jane.doe@college.edu" required>
                    <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>
                
                <div class="form-group">
                    <label for="department">🏢 Department</label>
                    <input type="text" id="department" th:field="*{department}" placeholder="e.g. Computer Science" required>
                    <div class="error" th:if="${#fields.hasErrors('department')}" th:errors="*{department}"></div>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="justify-content: center;">
                        ✅ Save Member
                    </button>
                    <a href="/employees" class="btn" style="justify-content: center; background: linear-gradient(135deg, var(--tertiary-color), var(--tertiary-hover)); color: white; text-decoration: none;">
                        ❌ Cancel
                    </a>
                </div>
            </form>
        </div>
    </main>
    </div>
</body>
</html>
