<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Assign Task | Task Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="sidebar">
        <h1>TaskForce Pro</h1>
        <nav>
            <a href="/">📁 Dashboard</a>
            <a href="/employees">👥 Employees</a>
            <a href="/tasks" class="active">📋 Task Board</a>
        </nav>
    </div>

    <div class="main-content">
        <header>
            <div class="search-bar">
                <input type="text" placeholder="Search tasks, employees...">
            </div>
            <div class="user-profile">
                <span>Welcome, Admin</span>
                <div class="avatar">A</div>
            </div>
        </header>

        <main>
            <div style="margin-bottom: 2rem; max-width: 600px; margin-left: auto; margin-right: auto;">
                <div style="margin-bottom: 2rem;">
                    <h2 style="font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, var(--primary-color), var(--accent-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">✨ Assign New Task</h2>
                    <p style="color: var(--text-muted); font-weight: 500; margin-top: 0.5rem;">Create and assign a task to a faculty member</p>
                </div>
        
        <div class="card">
            <form th:action="@{/tasks}" th:object="${task}" method="post">
                <div class="form-group">
                    <label for="description">📝 Task Description</label>
                    <input type="text" id="description" th:field="*{description}" placeholder="e.g. Prepare question paper for midterm" required>
                    <div class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                </div>
                
                <div class="form-group">
                    <label for="taskType">📚 Task Type</label>
                    <select id="taskType" th:field="*{taskType}" required>
                        <option value="">-- Select Task Type --</option>
                        <option value="Exam Duty">Exam Duty</option>
                        <option value="Project Guide Allocation">Project Guide Allocation</option>
                        <option value="Documentation Work">Documentation Work</option>
                        <option value="Event Coordination">Event Coordination</option>
                        <option value="Report Submission">Report Submission</option>
                    </select>
                    <div class="error" th:if="${#fields.hasErrors('taskType')}" th:errors="*{taskType}"></div>
                </div>
                
                <div class="form-group">
                    <label for="employee">👤 Assign To (Faculty Member)</label>
                    <select id="employee" th:field="*{employee.id}" required>
                        <option value="">-- Select a Faculty Member --</option>
                        <option th:each="emp : ${employees}" th:value="${emp.id}" th:text="${emp.name} + ' (' + ${emp.department} + ')'"></option>
                    </select>
                    <div class="error" th:if="${#fields.hasErrors('employee')}" th:errors="*{employee}"></div>
                </div>

                <div class="form-group">
                    <label for="dueDate">📅 Due Date</label>
                    <input type="date" id="dueDate" th:field="*{dueDate}" required>
                    <div class="error" th:if="${#fields.hasErrors('dueDate')}" th:errors="*{dueDate}"></div>
                </div>
                
                <div class="form-group">
                    <label for="status">🏷️ Initial Status</label>
                    <select id="status" th:field="*{status}" required>
                        <option value="PENDING">Pending</option>
                        <option value="IN_PROGRESS">In Progress</option>
                        <option value="COMPLETED">Completed</option>
                    </select>
                    <div class="error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="justify-content: center;">
                        ✅ Assign Task
                    </button>
                    <a href="/tasks" class="btn" style="justify-content: center; background: linear-gradient(135deg, var(--tertiary-color), var(--tertiary-hover)); color: white; text-decoration: none;">
                        ❌ Cancel
                    </a>
                </div>
            </form>
        </div>
    </main>
    </div>
</body>
</html>
